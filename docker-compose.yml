version: '3.8'
services:
  web:
    build: .
    container_name: idor_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: idor_db
    restart: always
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./idor_lab.sql:/docker-entrypoint-initdb.d/idor_lab.sql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: idor_lab

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: idor_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
volumes:
  mysql_data: